apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: eva-webservices-new-local

resources:
- namespace.yaml
- postgres.yaml
- mongo.yaml
- ../../base

# Patch the base deployment/service for local testing
patches:
- path: deployment-patch.yaml
- path: service-patch.yaml
# Skip real ingress host for local testing
- target:
    group: networking.k8s.io
    version: v1
    kind: Ingress
    name: eva-webservices-new
  patch: |
    - op: replace
      path: /spec/rules/0/host
      value: localhost

# Use the locally-built image (docker build -t eva-webservices-new:local .)
images:
- name: ebivariation/eva-webservices-new
  newName: eva-webservices-new
  newTag: local

# Generate secret with application.properties for local testing
secretGenerator:
- name: eva-webservices-new-config
  files:
  - application.properties
