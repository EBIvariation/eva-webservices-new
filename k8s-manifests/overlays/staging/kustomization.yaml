apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: eva-webservices-new-stage
resources:
- namespace.yaml
- ../../base
patches:
- path: deployment-patch.yaml
- path: ingress-patch.yaml
images:
- name: dockerhub.ebi.ac.uk/ebivariation/eva-webservices-new
  # TEMPORARY: ebivariation/eva-webservices-new doesn't exist as its own
  # repository in the registry yet. Borrowing the ebivariation/eva-seqcol
  # repository as scratch space for manual testing (tags are clearly
  # prefixed eva-webservices-new-manual-* so they're easy to find and
  # delete). Once the real repository exists, delete the newName line
  # below and push to dockerhub.ebi.ac.uk/ebivariation/eva-webservices-new
  # directly.
  newName: dockerhub.ebi.ac.uk/ebivariation/eva-seqcol
  newTag: eva-webservices-new-manual-20260709-1640   # bump manually after each `docker push`, see README
secretGenerator:
- name: eva-webservices-new-config
  files:
  - application.properties
