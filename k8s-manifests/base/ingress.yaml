apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: eva-webservices-new
  labels:
    app: eva-webservices-new
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
spec:
  rules:
  - host: eva-webservices-new.example.com  # Replace with your hostname in overlays
    http:
      paths:
      - path: /eva/webservices/eva-webservices-new
        pathType: Prefix
        backend:
          service:
            name: eva-webservices-new
            port:
              number: 8080
