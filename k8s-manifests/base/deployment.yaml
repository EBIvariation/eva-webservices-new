apiVersion: apps/v1
kind: Deployment
metadata:
  name: eva-webservices-new
  labels:
    app: eva-webservices-new
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: eva-webservices-new
  template:
    metadata:
      labels:
        app: eva-webservices-new
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000

      imagePullSecrets:
        - name: regcred

      containers:
      - name: eva-webservices-new
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          protocol: TCP

        env:
        # JVM tuning for containers
        - name: JAVA_OPTS
          value: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:+UseG1GC"

        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"

        livenessProbe:
          httpGet:
            path: /eva/webservices/eva-webservices-new/health
            port: 8080
          initialDelaySeconds: 90
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /eva/webservices/eva-webservices-new/health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        volumeMounts:
        - name: tmp-volume
          mountPath: /tmp
        - name: config-volume
          mountPath: /app/config
          readOnly: true

      volumes:
      - name: tmp-volume
        emptyDir: {}
      - name: config-volume
        secret:
          secretName: eva-webservices-new-config
          items:
          - key: application.properties
            path: application.properties
          defaultMode: 0444

      # Spread pods across nodes for high availability.
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: eva-webservices-new
              topologyKey: kubernetes.io/hostname
