apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# This is the default kustomization that applies the base configuration.
# For environment-specific deployments, use the overlays instead:
#
# Local development (with local PostgreSQL and MongoDB):
#   kubectl apply -k k8s-manifests/overlays/local
#
# Development environment:
#   kubectl apply -k k8s-manifests/overlays/dev
#
# Staging environment:
#   kubectl apply -k k8s-manifests/overlays/staging
#
# To add a new environment, create a new overlay directory under overlays/

resources:
- base
